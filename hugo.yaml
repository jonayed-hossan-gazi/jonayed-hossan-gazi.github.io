# ═══════════════════════════════════════════════════
# STRICT RULES (follow these for long-term sanity)
# ═══════════════════════════════════════════════════
#
# CATEGORIES — use only these; add sparingly:
#   Technology    → tech, AI, programming, tools
#   Consciousness → philosophy, life, growth
#   Guides        → tutorials, how-to, step-by-step
#
# IMAGES — always use this path pattern:
#   /images/posts/YYYY/MM/slug/filename.ext
#   Site assets → /images/site/
#   Never hotlink external images.
#
# POSTS — always start with draft: true, set to false when ready.
#   Never use draft posts as "notes" — they still get published in some outputs.
#
# SLUGS — lowercase, hyphens, no dates in filename.
#   Good: understanding-closures.md
#   Bad: 2024-Understanding-Closures.md
#
# COMMITS — describe what changed, not why.
#   Good: "add post about closures"
#   Bad:  "fixed stuff"
# ═══════════════════════════════════════════════════

# ── Site ──────────────────────────────────────────
baseURL: https://jonayed-hossan-gazi.github.io/
title: Jonayed Hossan Gazi
languageCode: en-us
theme: PaperMod
enableRobotsTXT: true            # SEO: generates /robots.txt

# ── Permalinks ────────────────────────────────────
# Clean, SEO-friendly URLs with year-month for longevity
permalinks:
  posts: /:year/:month/:slugorcontentbasename/

# ── Taxonomies ────────────────────────────────────
# Categories = broad buckets    Tags = specific labels
# "series" is custom — great for multi-part content
taxonomies:
  category: categories
  tag: tags
  series: series

# ── Build ─────────────────────────────────────────
# Enable these globally so frontmatter is cleaner
buildDrafts: false
buildFuture: false
buildExpired: false

# ── Pagination ────────────────────────────────────
pagination:
  pagerSize: 10

# ── Output ────────────────────────────────────────
outputs:
  home:
    - HTML
    - RSS         # RSS feed for SEO / readers
    - JSON        # JSON feed for some readers
  section:
    - HTML
    - RSS         # per-section RSS feeds

# ── Markup ────────────────────────────────────────
markup:
  highlight:
    style: dracula
    lineNos: false
  goldmark:
    renderer:
      unsafe: true           # allows raw HTML in markdown
  tableOfContents:
    startLevel: 2
    endLevel: 4

# ── Related Content ───────────────────────────────
related:
  includeNewer: true
  indices:
    - name: tags
      weight: 100
    - name: categories
      weight: 80
  threshold: 30
  toLower: true

# ── Privacy (GDPR) ────────────────────────────────
privacy:
  disqus:
    disable: true
  googleAnalytics:
    disable: true
  instagram:
    disable: true
  x:
    disable: true
  vimeo:
    disable: true
  youtube:
    disable: true

# ═══════════════════════════════════════════════════
# PAPERMOD PARAMS
# ═══════════════════════════════════════════════════
params:
  env: production

  # ── Homepage ────────────────────────────────────
  homeInfoParams:
    Title: "Builder, writer, founder"
    Content: >
      Founder of [Wapka](https://wapka.org) & [Zuna](https://zuna.id).
      I write about AI, programming, hosting, and the philosophy of building things on the internet.

  # ── SEO ─────────────────────────────────────────
  # These drive OpenGraph + Twitter Cards + JSON-LD
  description: "Thoughts and Things — decoding the digital world."
  author: "Jonayed Hossan Gazi"
  keywords: [technology, programming, AI, web development, personal blog]
  images:
    - "/images/site/og-default.png"

  # ── Appearance ──────────────────────────────────
  defaultTheme: auto         # respects system preference
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true     # prev / next post links
  ShowBreadCrumbs: true      # Home > Category > Post
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  ShowFullTextinRSS: false
  ShowToc: true              # table of contents in posts
  TocOpen: false
  comments: true             # Utterances (see below)
  # ── Utterances ──────────────────────────────────
  utterances:
    repo: "jonayed-hossan-gazi/jonayed-hossan-gazi.github.io"
    issueTerm: "pathname"
    label: "comment"
    theme: "preferred-color-scheme"

  # ── Search ──────────────────────────────────────
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 100
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

  # ── Social links (footer) ───────────────────────
  socialIcons:
    - name: github
      url: "https://github.com/jonayed-hossan-gazi"
    - name: linkedin
      url: "https://linkedin.com/in/jonayed-hossan-gazi"
    - name: facebook
      url: "https://facebook.com/jonayed.hossan.gazi"
    - name: upwork
      url: "https://upwork.com/freelancers/jonayedh"
    - name: rss
      url: "index.xml"

  # ── Analytics (uncomment when ready) ────────────
  # googleSiteVerification: ""  # Google Search Console verification code
  # analytics:
  #   google:
  #     SiteVerificationTag: "your-gtag-id"

  # ── Assets ──────────────────────────────────────
  assets:
    disableHLJS: true
    favicon: "/favicon.ico"
    favicon16x16: "/favicon-16x16.png"
    favicon32x32: "/favicon-32x32.png"
    apple_touch_icon: "/apple-touch-icon.png"
    safari_pinned_tab: ""

# ═══════════════════════════════════════════════════
# MAIN MENU
# ═══════════════════════════════════════════════════
menu:
  main:
    - identifier: posts
      name: Posts
      url: /posts/
      weight: 10
    - identifier: projects
      name: Projects
      url: /projects/
      weight: 20
    - identifier: now
      name: Now
      url: /now/
      weight: 30
    - identifier: about
      name: About
      url: /about/
      weight: 40
